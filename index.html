  <script>
    var SUPABASE_URL = 'https://ztngxhnhbakncgdlusjx.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0bmd4aG5oYmFrbmNnZGx1c2p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjU4NzUsImV4cCI6MjA5NzMwMTg3NX0.H6UOcR_ANTd28MIQcp8_jc-Y5_R3EuJjzLkhqJeiGH0';
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    var currentUser = null;
    var matches = [];
    var predictions = {};
    var isLoginMode = true;

    // Listen for password recovery
    supabase.auth.onAuthStateChange(function(event, session) {
      if (event === 'PASSWORD_RECOVERY') {
        var newPassword = prompt('Ingresá tu nueva contraseña:');

          });
        }
      }

    // Auth
    document.getElementById('authBtn').addEventListener('click', handleAuth);
    async function handleAuth() {
      var email = document.getElementById('emailInput').value;
      var password = document.getElementById('passwordInput').value;
      if (!email || !password) { alert('Completá email y contraseña'); return; }
      var result;
      if (isLoginMode) {
        result = await supabase.auth.signInWithPassword({ email: email, password: password });
      } else {
        result = await supabase.auth.signUp({ email: email, password: password });
      }
      if (result.error) { alert('Error: ' + result.error.message); return; }
      currentUser = result.data.user;
      showApp();
    }

    // Forgot password
    document.getElementById('forgotBtn').addEventListener('click', async function() {
      var email = document.getElementById('emailInput').value;
      if (!email) { alert('Ingresá tu email primero'); return; }
      var result = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname
      });
      if (result.error) { alert('Error: ' + result.error.message); }
      else { alert('Revisá tu email. Te enviamos un link para cambiar tu contraseña.'); }
    });

    // Toggle login/register
    document.getElementById('toggleLink').addEventListener('click', function() {
      isLoginMode = !isLoginMode;
      document.getElementById('authTitle').textContent = isLoginMode ? 'Iniciar Sesión' : 'Registrarse';
      document.getElementById('authBtn').textContent = isLoginMode ? 'Entrar' : 'Crear Cuenta';
      document.getElementById('authToggle').innerHTML = isLoginMode
        ? '¿No tenés cuenta? <span id="toggleLink">Registrate</span>'
        : '¿Ya tenés cuenta? <span id="toggleLink">Iniciá sesión</span>';
      document.getElementById('toggleLink').addEventListener('click', arguments.callee);
    });

    // Check session on load
    supabase.auth.getSession().then(function(result) {
      if (result.data.session) {
        currentUser = result.data.session.user;
        showApp();
      }
    });

    async function showApp() {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('appSection').style.display = 'block';
      await loadMatches();
      await loadPredictions();
      renderMatches('all');
      loadLeaderboard();
      loadChampionPrediction();
    }

    // Load matches
    async function loadMatches() {
      var result = await supabase.from('matches').select('*').order('match_date', { ascending: true });
      if (result.data) { matches = result.data; }
    }

    // Load predictions
    async function loadPredictions() {
      var result = await supabase.from('predictions').select('*').eq('user_id', currentUser.id);
      if (result.data) {
        predictions = {};
        for (var i = 0; i < result.data.length; i++) {
          predictions[result.data[i].match_id] = result.data[i];
        }
      }
    }

    // Parse match date
    function parseMatchDate(dateStr) {
      if (!dateStr) return new Date();
      var str = String(dateStr);
      if (str.indexOf('+') === -1 && str.indexOf('Z') === -1) {
        str = str.replace(' ', 'T') + '+00:00';
      }
      return new Date(str);
    }

    // Format match date in local time
    function formatMatchDate(dateStr) {
      var date = parseMatchDate(dateStr);
      var day = date.toLocaleDateString('es', { day: 'numeric', month: 'short' });
      var time = date.toLocaleTimeString('es', { hour: 'numeric', minute: '2-digit', hour12: true });
      return day + ', ' + time;
    }

    // Check if knockout phase
    function isKnockout(groupStage) {
      return groupStage === 'Octavos' || groupStage === 'Cuartos' || groupStage === 'Semifinal' || groupStage === 'Tercer Puesto' || groupStage === 'Final';
    }

    // Render matches
    function renderMatches(group) {
      var filtered = [];
      for (var i = 0; i < matches.length; i++) {
        if (group === 'all' || matches[i].group_stage === group) {
          filtered.push(matches[i]);
        }
      }
      var container = document.getElementById('matchesContainer');
      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var match = filtered[i];
        var pred = predictions[match.id] || {};
        var isFinal = match.home_score !== null && match.away_score !== null;
        var now = new Date();
        var matchDate = parseMatchDate(match.match_date);
        var thirtyMinBefore = new Date(matchDate.getTime() - 30 * 60000);
        var isClosed = now >= thirtyMinBefore;
        var isLive = now >= matchDate && !isFinal;
        var knockout = isKnockout(match.group_stage);

        // Status label
        var statusLabel = '';
        if (isFinal) {
          statusLabel = '<span class="status-label" style="background:rgba(255,215,0,0.2);color:#ffd700;">✅ Finalizado</span>';
        } else if (isLive) {
          statusLabel = '<span class="status-label" style="background:rgba(0,255,100,0.2);color:#00ff64;">🟢 En juego</span>';
        } else if (isClosed) {
          statusLabel = '<span class="status-label" style="background:rgba(255,0,0,0.2);color:#ff6b6b;">🔒 Cerrado</span>';
        } else {
          statusLabel = '<span class="status-label" style="background:rgba(100,200,255,0.2);color:#64b5f6;">⏳ Por jugar</span>';
        }

        // Points
        var pointsHtml = '';
        if (isFinal && pred.home_score !== undefined && pred.home_score !== null) {
          var pointsEarned = 0;
          if (pred.home_score == match.home_score && pred.away_score == match.away_score) {
            pointsEarned = 5;
          } else {
            var predDiff = pred.home_score - pred.away_score;
            var realDiff = match.home_score - match.away_score;
            if ((predDiff > 0 && realDiff > 0) || (predDiff < 0 && realDiff < 0) || (predDiff === 0 && realDiff === 0)) {
              pointsEarned = 2;
            }
          }
          pointsHtml = '<div style="text-align:center;margin-top:8px;font-size:0.8rem;font-weight:700;color:' + (pointsEarned === 5 ? '#ffd700' : pointsEarned === 2 ? '#64b5f6' : '#ff6b6b') + ';">+' + pointsEarned + ' pts</div>';
        }

        var dateStr = formatMatchDate(match.match_date);
        html += '<div class="match-card' + (knockout ? ' knockout' : '') + '">';
        html += statusLabel;
        if (knockout) {
          html += '<div style="text-align:center;"><span class="phase-badge">' + match.group_stage + '</span></div>';
        }
        html += '<div class="match-header">' + match.group_stage + ' - ' + dateStr + '</div>';
        html += '<div class="match-teams">';
        html += '<div class="team"><span class="team-flag">' + (match.home_flag || '') + '</span><span class="team-name">' + match.home_team + '</span></div>';
        html += '<div class="score-inputs">';
        html += '<input type="number" class="score-input" id="h_' + match.id + '" min="0" max="20" value="' + (pred.home_score !== undefined && pred.home_score !== null ? pred.home_score : '') + '"' + (isClosed ? ' disabled' : '') + '>';
        html += '<span class="score-separator">-</span>';
        html += '<input type="number" class="score-input" id="a_' + match.id + '" min="0" max="20" value="' + (pred.away_score !== undefined && pred.away_score !== null ? pred.away_score : '') + '"' + (isClosed ? ' disabled' : '') + '>';
        html += '</div>';
        html += '<div class="team"><span class="team-flag">' + (match.away_flag || '') + '</span><span class="team-name">' + match.away_team + '</span></div>';
        html += '</div>';

        if (isFinal) {
          html += '<div style="text-align:center;margin-top:8px;font-size:0.85rem;color:#ffd700;font-weight:700;">Resultado: ' + match.home_score + ' - ' + match.away_score + '</div>';
        }
        html += pointsHtml;

        if (!isClosed) {
          html += '<button class="save-btn" data-matchid="' + match.id + '">Guardar</button>';
        } else if (!isFinal && pred.home_score !== undefined && pred.home_score !== null) {
          html += '<div style="text-align:center;margin-top:8px;font-size:0.75rem;color:#aaa;">Tu predicción: ' + pred.home_score + ' - ' + pred.away_score + ' ✅</div>';
        }
        html += '</div>';
      }
      container.innerHTML = html;

      // Add save listeners
      var saveBtns = container.querySelectorAll('.save-btn');
      for (var i = 0; i < saveBtns.length; i++) {
        saveBtns[i].addEventListener('click', function() { savePrediction(this.getAttribute('data-matchid')); });
      }
    }

    // Save prediction
    async function savePrediction(matchId) {
      var homeScore = parseInt(document.getElementById('h_' + matchId).value);
      var awayScore = parseInt(document.getElementById('a_' + matchId).value);
      if (isNaN(homeScore) || isNaN(awayScore)) { alert('Ingresá ambos marcadores'); return; }
      var result = await supabase.from('predictions').upsert({
        user_id: currentUser.id,
        match_id: matchId,
        home_score: homeScore,
        away_score: awayScore
      }, { onConflict: 'user_id,match_id' });
      if (result.error) { alert('Error: ' + result.error.message); return; }
      if (result.data && result.data[0]) { predictions[matchId] = result.data[0]; }

      // Toast animado
      var toast = document.createElement('div');
      toast.textContent = '✅ Predicción guardada';
      toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(90deg,#00c853,#00e676);color:#fff;padding:12px 24px;border-radius:30px;font-weight:700;font-size:0.9rem;z-index:9999;opacity:0;transition:all 0.4s ease;box-shadow:0 4px 15px rgba(0,200,83,0.4);';
      document.body.appendChild(toast);
      setTimeout(function() { toast.style.opacity = '1'; toast.style.transform = 'translateX(-50%) translateY(0)'; }, 50);
      setTimeout(function() { toast.style.opacity = '0'; toast.style.transform = 'translateX(-50%) translateY(20px)'; setTimeout(function() { toast.remove(); }, 400); }, 2000);

      var activeGroup = document.getElementById('groupFilter').value;
      renderMatches(activeGroup);
    }

    // Champion
async function loadChampionPrediction() {
  var result = await supabase.from('profiles').select('champion_pick').eq('id', currentUser.id).single();
  if (result.data && result.data.champion_pick) {
    document.getElementById('championSelect').value = result.data.champion_pick;
  }
}

document.getElementById('saveChampionBtn').addEventListener('click', async function() {
  var champion = document.getElementById('championSelect').value;
  if (!champion) { alert('Elegí un equipo'); return; }
  var result = await supabase.from('profiles').update({ champion_pick: champion }).eq('id', currentUser.id);
  if (result.error) { alert('Error: ' + result.error.message); }
  else { alert('Campeón guardado: ' + champion + ' 🏆'); }
});

    // Leaderboard
    async function loadLeaderboard() {
      var result = await supabase.from('leaderboard_view').select('*');
      var container = document.getElementById('leaderboardContainer');
      if (!result.data || result.data.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#aaa;">No hay datos aún</p>';
        return;
      }
      var sorted = result.data.sort(function(a, b) { return (b.total_points || 0) - (a.total_points || 0); });
      var html = '';
      for (var i = 0; i < sorted.length; i++) {
        var medals = ['🥇', '🥈', '🥉'];
        var rank = i < 3 ? medals[i] : (i + 1);
        html += '<div class="leaderboard-item">';
        html += '<span class="leaderboard-rank">' + rank + '</span>';
        html += '<span class="leaderboard-name">' + (sorted[i].display_name || 'Jugador') + '</span>';
        html += '<span class="leaderboard-points">' + (sorted[i].total_points || 0) + ' pts</span>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    // Tabs
    var tabs = document.querySelectorAll('.tab');
    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        tabs.forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        var target = this.getAttribute('data-tab');
        document.getElementById('matchesTab').style.display = target === 'matches' ? 'block' : 'none';
        document.getElementById('championTab').style.display = target === 'champion' ? 'block' : 'none';
        document.getElementById('leaderboardTab').style.display = target === 'leaderboard' ? 'block' : 'none';
        if (target === 'leaderboard') { loadLeaderboard(); }
      });
    });

    // Group filter
    document.getElementById('groupFilter').addEventListener('change', function() {
      renderMatches(this.value);
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async function() {
      await supabase.auth.signOut();
      currentUser = null;
      document.getElementById('appSection').style.display = 'none';
      document.getElementById('authSection').style.display = 'block';
    });
  </script>
</body>
</html>
